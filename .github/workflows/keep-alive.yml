name: Supabase Keep-Alive

# Run every Monday at 9:00 AM UTC (2:30 PM IST)
on:
  schedule:
    - cron: '0 9 * * 1'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ping Keep-Alive Endpoint
        run: |
          response=$(curl -s -w "\n%{http_code}" https://mindsafe-india.vercel.app/api/cron/keep-alive)
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          
          echo "HTTP Status: $http_code"
          echo "Response: $body"
          
          if [ "$http_code" -ne 200 ]; then
            echo "❌ Keep-alive failed with status $http_code"
            exit 1
          else
            echo "✅ Keep-alive successful"
          fi
      
      - name: Send notification on failure
        if: failure()
        run: |
          echo "⚠️ Keep-alive check failed. Please check Supabase status."
